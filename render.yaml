services:
  - type: web
    name: ovivo-compiler-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-url.com  # update with actual frontend URL
    autoDeploy: true
